* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "Figtree", Helvetica, Tahoma, Verdana, Arial, sans-serif;
    background-color: #FFFFFF;
    color: #3D3D3D;
    line-height: 1.6;
    padding: 0.5rem;
}

h1, h2, h3, h4 { color: #095339; }

/* KPI cards */
.snapshot-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
.snapshot-row.single-county { display: block; max-width: 480px; margin: 0 auto 1rem; }
.county-card {
    flex: 1;
    background: linear-gradient(135deg, #F8F9FA 0%, #FFFFFF 100%);
    border-radius: 12px;
    padding: 1.5rem;
    border-left: 5px solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.county-card h3 { margin: 0 0 0.8rem 0; font-size: 1.3rem; }
.kpi-row { display: flex; justify-content: space-between; gap: 0.8rem; }
.kpi-item { flex: 1; text-align: center; }
.kpi-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.2rem;
    color: #3D3D3D;
    min-height: 1.8rem;
    line-height: 0.9rem;
}
.kpi-value { font-size: 1.4rem; font-weight: 700; color: #095339; }
.kpi-delta { font-size: 0.8rem; margin-top: 0.1rem; }
.kpi-delta.positive { color: #2E7D32; }
.kpi-delta.negative { color: #C41230; }
.kpi-row.secondary {
    margin-top: 0.9rem;
    padding-top: 0.7rem;
    border-top: 1px solid #CCCCCC;
}
.kpi-period { font-size: 0.7rem; color: #888; margin-top: 0.15rem; }
.kpi-caption {
    font-size: 0.78rem;
    color: #888;
    margin: 0.75rem 0 0 0;
    line-height: 1.3;
}

/* Chart sections */
.section { margin: 0; }
.section h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
.section p { margin-bottom: 0.75rem; }

.chart-row { display: flex; gap: 1rem; }
.chart-col { flex: 1; min-width: 0; }

.source {
    font-size: 0.8rem;
    color: #888;
    margin-top: 0.25rem;
}
.source a { color: #FFC425; text-decoration: none; }
.source a:hover { text-decoration: underline; }

@media (max-width: 768px) {
    .snapshot-row, .chart-row { flex-direction: column; }
    body { padding: 0.3rem; }
}

</style>
