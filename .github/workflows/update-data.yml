name: Update Dashboard Data

on:
  schedule:
    # Every Monday at 6:00 AM UTC (1:00 AM Eastern)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Build static dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update dashboard data'
          # Bare 'docs' (no glob) so git add recurses into docs/embeds/<county>/.
          # The 'docs/*' glob would only match top-level files and silently skip embeds.
          # Also commit the two FRED caches so each successful run refreshes the
          # last-good fallback used when a later fetch fails (see data/fetch_fred.py).
          file_pattern: docs data/cache/qcew_fred_gdp.parquet data/cache/qcew_fred_unrate.parquet
